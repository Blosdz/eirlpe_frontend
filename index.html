<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <script>
    (function() {
      var stored = localStorage.getItem('eirlpe-theme');
      var dark = stored === 'dark' || (!stored && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.add(dark ? 'dark' : 'light');
    })();
  </script>
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>eirl.pe | Tu Dominio Profesional</title>
  <meta name="description" content="Registra tu subdominio .eirl.pe, hosting con SSL incluido. Tu presencia digital profesional en minutos." />
  <!-- Android / Chrome -->
  <meta name="theme-color" content="#07051A" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#F5F3FF" media="(prefers-color-scheme: light)" />
  <meta name="mobile-web-app-capable" content="yes" />
  <!-- Apple iOS / Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="eirl.pe" />
  <link rel="apple-touch-icon" href="/vite.svg" />
  <!-- Microsoft -->
  <meta name="msapplication-TileColor" content="#312773" />
  <meta name="msapplication-tap-highlight" content="no" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

  <div id="root"></div>

</body>

</html>
